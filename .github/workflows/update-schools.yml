name: Update Schools

on:
  schedule:
    # Monthly on the 1st at midnight UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-schools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Geocode schools missing coordinates
        run: python scripts/update_schools.py v1/flight_schools.json

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet v1/flight_schools.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "ClearedDirect Bot"
          git config user.email "bot@cleareddirect.com"
          git add v1/flight_schools.json
          git commit -m "Auto-geocode schools $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
