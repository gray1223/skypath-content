name: Update Content

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest news from RSS feeds
        run: python scripts/update_news.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet v1/news_feed.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "ClearedDirect Bot"
          git config user.email "bot@cleareddirect.com"
          git add v1/news_feed.json
          git commit -m "Auto-update news feed $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
